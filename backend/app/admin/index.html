<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阮琪斌 - 联系管理后台</title>
    <style>
        :root {
            --bg: #f5f5f7;
            --white: #fff;
            --text: #1c1c1e;
            --text-secondary: #86868b;
            --text-tertiary: #aeaeb2;
            --green: #5b8c5a;
            --green-light: #e8f4e8;
            --orange: #f5a623;
            --orange-light: #fef6e8;
            --red: #ff3b30;
            --red-light: #ffe5e3;
            --border: #e5e5ea;
            --border-light: #f0f0f3;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-lg: 0 4px 16px rgba(0,0,0,0.08);
            --radius-sm: 10px;
            --radius: 14px;
            --radius-lg: 18px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
        }

        .header {
            background: rgba(255,255,255,0.72);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border-light);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .header-inner {
            max-width: 1024px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
        .header .subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

        .container { max-width: 1024px; margin: 0 auto; padding: 24px; }

        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .stat-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid var(--border-light);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .stat-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
        .stat-card .label { font-size: 12px; color: var(--text-tertiary); margin-bottom: 6px; font-weight: 500; }
        .stat-card .value { font-size: 36px; font-weight: 600; letter-spacing: -0.03em; }
        .stat-card.total .value { color: var(--text); }
        .stat-card.unread .value { color: var(--orange); }

        .toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .toolbar input,
        .toolbar select {
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            font-size: 13px;
            outline: none;
            background: var(--white);
            color: var(--text);
            transition: all 0.15s;
            font-family: inherit;
        }
        .toolbar input:focus,
        .toolbar select:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(91,140,90,0.12); }
        .toolbar input { flex: 1; min-width: 160px; }
        .toolbar input::placeholder { color: var(--text-tertiary); }
        .toolbar select { cursor: pointer; }

        .btn {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            font-family: inherit;
            letter-spacing: -0.01em;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .btn-primary { background: var(--green); color: #fff; }
        .btn-primary:hover { background: #4a7a49; }
        .btn-secondary { background: var(--white); color: var(--text-secondary); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--bg); }
        .btn-success { background: var(--green); color: #fff; }
        .btn-success:hover { background: #4a7a49; }
        .btn-danger { background: var(--red); color: #fff; }
        .btn-danger:hover { background: #e63329; }

        .batch-bar {
            display: none;
            background: var(--green-light);
            border: 1px solid rgba(91,140,90,0.15);
            border-radius: var(--radius);
            padding: 10px 16px;
            margin-bottom: 16px;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .batch-bar.show { display: flex; }
        .batch-bar span { font-size: 13px; color: var(--green); font-weight: 500; }
        .batch-btn {
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid;
            font-weight: 500;
            background: var(--white);
            font-family: inherit;
            letter-spacing: -0.01em;
            transition: all 0.15s;
        }
        .batch-btn.read { color: var(--green); border-color: var(--green); }
        .batch-btn.read:hover { background: var(--green-light); }
        .batch-btn.reply { color: var(--orange); border-color: var(--orange); }
        .batch-btn.reply:hover { background: var(--orange-light); }
        .batch-btn.delete { color: var(--red); border-color: var(--red); }
        .batch-btn.delete:hover { background: var(--red-light); }
        .batch-btn.cancel { color: var(--text-tertiary); border-color: var(--border); }

        .select-all-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 0 12px 0;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .select-all-row input[type="checkbox"] { accent-color: var(--green); width: 16px; height: 16px; cursor: pointer; }

        .inquiry-list { display: flex; flex-direction: column; gap: 8px; }
        .inquiry-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 16px;
            border: 1px solid var(--border-light);
            display: flex;
            gap: 14px;
            align-items: flex-start;
            transition: all 0.15s;
        }
        .inquiry-card:hover { box-shadow: var(--shadow); }
        .inquiry-card.unread { border-left: 3px solid var(--orange); background: var(--orange-light); }
        .inquiry-card.replied { border-left: 3px solid var(--green); }
        .inquiry-card .cb-col { padding-top: 2px; flex-shrink: 0; }
        .inquiry-card .cb-col input[type="checkbox"] { accent-color: var(--green); width: 16px; height: 16px; cursor: pointer; }
        .inquiry-card .content-col { flex: 1; min-width: 0; }
        .inquiry-card .top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; flex-wrap: wrap; gap: 6px; }
        .inquiry-card .name { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
        .inquiry-card .time { font-size: 12px; color: var(--text-tertiary); }
        .inquiry-card .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 4px; margin-bottom: 10px; }
        .inquiry-card .info-item { font-size: 13px; color: var(--text-secondary); }
        .inquiry-card .info-item strong { color: var(--text); font-weight: 500; }
        .inquiry-card .message { background: var(--bg); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; word-break: break-word; line-height: 1.6; }
        .inquiry-card .actions { display: flex; gap: 6px; flex-wrap: wrap; }
        .inquiry-card .actions button { padding: 4px 12px; border-radius: 16px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--white); color: var(--text-secondary); font-family: inherit; font-weight: 500; letter-spacing: -0.01em; transition: all 0.15s; }
        .inquiry-card .actions button:hover { background: var(--bg); }
        .inquiry-card .actions button.primary { background: var(--green); color: #fff; border-color: var(--green); }
        .inquiry-card .actions button.primary:hover { background: #4a7a49; }
        .inquiry-card .actions button.danger { color: var(--red); border-color: #ffcdcb; }
        .inquiry-card .actions button.danger:hover { background: var(--red-light); }
        .inquiry-card .note { margin-top: 8px; font-size: 12px; color: var(--text-tertiary); }

        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; margin-left: 6px; vertical-align: middle; letter-spacing: -0.01em; }
        .badge.unread { background: var(--orange-light); color: #b25e00; }
        .badge.replied { background: var(--green-light); color: #2d6a2e; }
        .badge.read { background: #f0f0f3; color: var(--text-tertiary); }

        .empty { text-align: center; padding: 60px 20px; color: var(--text-tertiary); }

        .pagination { display: flex; justify-content: center; gap: 6px; margin-top: 24px; }
        .pagination button { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--white); cursor: pointer; font-size: 13px; font-family: inherit; color: var(--text-secondary); font-weight: 500; transition: all 0.15s; }
        .pagination button.active { background: var(--green); color: #fff; border-color: var(--green); }
        .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }

        .login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .login-box { background: var(--white); border-radius: var(--radius-lg); padding: 36px; width: 360px; box-shadow: var(--shadow-lg); }
        .login-box h2 { text-align: center; margin-bottom: 28px; font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
        .login-box input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; margin-bottom: 12px; outline: none; font-family: inherit; transition: all 0.15s; }
        .login-box input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(91,140,90,0.12); }
        .login-box button { width: 100%; padding: 10px; background: var(--green); color: #fff; border: none; border-radius: 20px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; letter-spacing: -0.01em; }
        .login-box button:hover { background: #4a7a49; }
        .login-error { color: var(--red); font-size: 13px; text-align: center; margin-bottom: 8px; display: none; }

        .toast { position: fixed; top: 24px; right: 24px; background: var(--text); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 200; transform: translateX(120%); transition: transform 0.3s; box-shadow: var(--shadow-lg); font-weight: 500; letter-spacing: -0.01em; }
        .toast.show { transform: translateX(0); }
        .toast.error { background: var(--red); }

        @media (max-width: 640px) {
            .toolbar { flex-direction: column; }
            .toolbar input { min-width: 100%; }
            .inquiry-card { flex-direction: column; }
            .inquiry-card .cb-col { align-self: flex-end; }
            .container { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-inner">
            <div>
                <h1>联系管理后台</h1>
                <div class="subtitle">查看和管理联系信息</div>
            </div>
        </div>
    </div>

    <div class="container" id="app" style="display:none;">
        <div class="stats">
            <div class="stat-card total" onclick="setFilter('all')">
                <div class="label">总联系数</div>
                <div class="value" id="totalCount">0</div>
            </div>
            <div class="stat-card unread" onclick="setFilter('unread')">
                <div class="label">未读联系</div>
                <div class="value" id="unreadCount">0</div>
            </div>
        </div>

        <div class="toolbar">
            <input type="text" id="searchInput" placeholder="搜索公司、联系人、岗位..." oninput="onSearchInput()" />
            <select id="sortSelect" onchange="loadInquiries()">
                <option value="created_at_desc">提交时间 ↓</option>
                <option value="created_at_asc">提交时间 ↑</option>
                <option value="name_asc">联系人 A-Z</option>
                <option value="name_desc">联系人 Z-A</option>
                <option value="company_asc">公司 A-Z</option>
                <option value="company_desc">公司 Z-A</option>
            </select>
            <select id="filterSelect" onchange="loadInquiries()">
                <option value="all">全部</option>
                <option value="unread">未读</option>
                <option value="read">已读</option>
            </select>
            <button class="btn btn-secondary" onclick="loadInquiries()">刷新</button>
            <button class="btn btn-success" onclick="exportExcel()">导出 Excel</button>
            <span style="flex:1"></span>
            <button class="btn btn-secondary" onclick="logout()">退出</button>
        </div>

        <div class="batch-bar" id="batchBar">
            <span>已选择 <span class="count" id="batchCount">0</span> 条</span>
            <button class="batch-btn read" onclick="batchMarkRead()">标记已读</button>
            <button class="batch-btn reply" onclick="batchMarkReplied()">标记已回复</button>
            <button class="batch-btn delete" onclick="batchDelete()">批量删除</button>
            <button class="batch-btn cancel" onclick="clearSelection()">取消</button>
        </div>

        <div class="select-all-row" id="selectAllRow" style="display:none;">
            <input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll()" />
            <label for="selectAllCheckbox">全选当前页</label>
        </div>

        <div class="inquiry-list" id="inquiryList"></div>
        <div class="pagination" id="pagination"></div>
    </div>

    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>管理员登录</h2>
            <div class="login-error" id="loginError">用户名或密码错误</div>
            <input type="text" id="username" placeholder="用户名" />
            <input type="password" id="password" placeholder="密码" />
            <button onclick="login()">登录</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API = '';
        let currentPage = 1;
        let authed = false;
        let selectedIds = new Set();
        let searchTimer = null;

        function showToast(msg, isError) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            if (isError) t.classList.add('error');
            else t.classList.remove('error');
            setTimeout(() => { t.classList.remove('show'); t.classList.remove('error'); }, 2500);
        }

        function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if (u && p) {
                authed = true;
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                loadInquiries();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function logout() {
            authed = false;
            selectedIds.clear();
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
            updateBatchBar();
        }

        function onSearchInput() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => { currentPage = 1; loadInquiries(); }, 300);
        }

        function setFilter(filter) {
            document.getElementById('filterSelect').value = filter;
            currentPage = 1;
            loadInquiries();
        }

        function getSortParams() {
            const val = document.getElementById('sortSelect').value;
            const parts = val.split('_');
            const order = parts.pop();
            const by = parts.join('_');
            return { sort_by: by, sort_order: order };
        }

        async function loadInquiries() {
            const filter = document.getElementById('filterSelect').value;
            const search = document.getElementById('searchInput').value.trim();
            const sort = getSortParams();
            let url = `${API}/api/inquiries?page=${currentPage}&page_size=20&sort_by=${sort.sort_by}&sort_order=${sort.sort_order}`;
            if (filter === 'unread') url += '&is_read=false';
            if (filter === 'read') url += '&is_read=true';
            if (search) url += `&search=${encodeURIComponent(search)}`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                document.getElementById('totalCount').textContent = data.total;
                document.getElementById('unreadCount').textContent = data.unread;
                document.getElementById('selectAllRow').style.display = data.items.length > 0 ? 'flex' : 'none';
                renderInquiries(data.items);
                renderPagination(data.total);
            } catch (e) {
                document.getElementById('inquiryList').innerHTML = '<div class="empty">加载失败，请检查后端服务是否启动</div>';
            }
        }

        function renderInquiries(items) {
            const container = document.getElementById('inquiryList');
            if (items.length === 0) {
                container.innerHTML = '<div class="empty">暂无联系记录</div>';
                return;
            }
            container.innerHTML = items.map(item => {
                const statusClass = item.is_replied ? 'replied' : (item.is_read ? '' : 'unread');
                const statusBadge = item.is_replied
                    ? '<span class="badge replied">已回复</span>'
                    : (item.is_read ? '<span class="badge read">已读</span>' : '<span class="badge unread">未读</span>');
                const checked = selectedIds.has(item.id) ? 'checked' : '';
                return `
                <div class="inquiry-card ${statusClass}">
                    <div class="cb-col">
                        <input type="checkbox" ${checked} onchange="toggleSelect(${item.id}, this.checked)" />
                    </div>
                    <div class="content-col">
                        <div class="top">
                            <div>
                                <span class="name">${escapeHtml(item.name)}</span>
                                ${statusBadge}
                            </div>
                            <div class="time">${new Date(item.created_at).toLocaleString('zh-CN')}</div>
                        </div>
                        <div class="info-grid">
                            <div class="info-item"><strong>公司</strong> ${escapeHtml(item.company) || '未填写'}</div>
                            <div class="info-item"><strong>岗位</strong> ${escapeHtml(item.position) || '未填写'}</div>
                            <div class="info-item"><strong>电话</strong> <a href="tel:${item.phone}">${item.phone}</a></div>
                        </div>
                        ${item.message ? `<div class="message">${escapeHtml(item.message)}</div>` : ''}
                        ${item.note ? `<div class="note">备注：${escapeHtml(item.note)}</div>` : ''}
                        <div class="actions">
                            ${!item.is_read ? `<button class="primary" onclick="markRead(${item.id})">标记已读</button>` : ''}
                            ${!item.is_replied ? `<button onclick="markReplied(${item.id})">标记已回复</button>` : ''}
                            <button onclick="addNote(${item.id})">备注</button>
                            <button class="danger" onclick="deleteInquiry(${item.id})">删除</button>
                        </div>
                    </div>
                </div>`;
            }).join('');

            const allChecked = items.every(item => selectedIds.has(item.id));
            document.getElementById('selectAllCheckbox').checked = allChecked;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderPagination(total) {
            const pages = Math.ceil(total / 20);
            const container = document.getElementById('pagination');
            if (pages <= 1) { container.innerHTML = ''; return; }
            let html = `<button ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">上一页</button>`;
            for (let i = 1; i <= pages; i++) {
                html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
            }
            html += `<button ${currentPage === pages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">下一页</button>`;
            container.innerHTML = html;
        }

        function goPage(page) { currentPage = page; loadInquiries(); }

        function toggleSelect(id, checked) {
            if (checked) selectedIds.add(id);
            else selectedIds.delete(id);
            updateBatchBar();
            const items = document.querySelectorAll('.inquiry-card .cb-col input[type="checkbox"]');
            const allChecked = items.length > 0 && Array.from(items).every(cb => cb.checked);
            document.getElementById('selectAllCheckbox').checked = allChecked;
        }

        function toggleSelectAll() {
            const allCb = document.getElementById('selectAllCheckbox');
            const items = document.querySelectorAll('.inquiry-card .cb-col input[type="checkbox"]');
            items.forEach(cb => {
                cb.checked = allCb.checked;
                const match = cb.getAttribute('onchange').match(/toggleSelect\((\d+)/);
                if (match) { const id = parseInt(match[1]); if (allCb.checked) selectedIds.add(id); else selectedIds.delete(id); }
            });
            updateBatchBar();
        }

        function clearSelection() {
            selectedIds.clear();
            document.querySelectorAll('.inquiry-card .cb-col input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.getElementById('selectAllCheckbox').checked = false;
            updateBatchBar();
        }

        function updateBatchBar() {
            const bar = document.getElementById('batchBar');
            const count = document.getElementById('batchCount');
            if (selectedIds.size > 0) { bar.classList.add('show'); count.textContent = selectedIds.size; }
            else { bar.classList.remove('show'); }
        }

        async function batchMarkRead() {
            if (selectedIds.size === 0) return;
            await fetch(`${API}/api/inquiries/batch/read`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ids: Array.from(selectedIds) }) });
            showToast(`已标记 ${selectedIds.size} 条为已读`);
            clearSelection();
            loadInquiries();
        }

        async function batchMarkReplied() {
            if (selectedIds.size === 0) return;
            await fetch(`${API}/api/inquiries/batch/reply`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ids: Array.from(selectedIds) }) });
            showToast(`已标记 ${selectedIds.size} 条为已回复`);
            clearSelection();
            loadInquiries();
        }

        async function batchDelete() {
            if (selectedIds.size === 0) return;
            if (!confirm(`确定要删除选中的 ${selectedIds.size} 条记录吗？`)) return;
            await fetch(`${API}/api/inquiries/batch`, { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ids: Array.from(selectedIds) }) });
            showToast(`已删除 ${selectedIds.size} 条记录`);
            clearSelection();
            loadInquiries();
        }

        function exportExcel() {
            const filter = document.getElementById('filterSelect').value;
            const search = document.getElementById('searchInput').value.trim();
            const sort = getSortParams();
            let url = `${API}/api/inquiries/export?sort_by=${sort.sort_by}&sort_order=${sort.sort_order}`;
            if (filter === 'unread') url += '&is_read=false';
            if (filter === 'read') url += '&is_read=true';
            if (search) url += `&search=${encodeURIComponent(search)}`;
            window.open(url, '_blank');
            showToast('正在导出...');
        }

        async function markRead(id) {
            await fetch(`${API}/api/inquiries/${id}/read`, { method: 'PUT' });
            showToast('已标记为已读');
            loadInquiries();
        }

        async function markReplied(id) {
            await fetch(`${API}/api/inquiries/${id}/reply`, { method: 'PUT' });
            showToast('已标记为已回复');
            loadInquiries();
        }

        async function addNote(id) {
            const note = prompt('请输入备注内容：');
            if (note !== null) {
                await fetch(`${API}/api/inquiries/${id}/note`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ note }) });
                showToast('备注已添加');
                loadInquiries();
            }
        }

        async function deleteInquiry(id) {
            if (confirm('确定要删除这条记录吗？')) {
                await fetch(`${API}/api/inquiries/${id}`, { method: 'DELETE' });
                selectedIds.delete(id);
                updateBatchBar();
                showToast('已删除');
                loadInquiries();
            }
        }

        document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    </script>
</body>
</html>
